<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Plant Health Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 50%, #52b788 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2d6a4f, #52b788);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(45, 106, 79, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-header .logo-icon i {
            font-size: 32px;
            color: white;
            animation: pulse-icon 2s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1b4332;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #1b4332;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #f9f9f9;
        }

        .form-control:focus {
            border-color: #2d6a4f;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.15);
            transform: translateY(-2px);
        }

        .form-control:hover:not(:focus) {
            border-color: #40916c;
        }

        .form-control::placeholder {
            color: #999;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(45, 106, 79, 0.5);
        }

        .btn-login:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert-box {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
            font-size: 14px;
        }

        .alert-error {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .alert-success {
            background-color: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #059669;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toggle-mode {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .toggle-mode span {
            color: #666;
            font-size: 14px;
        }

        .toggle-mode a {
            color: #2d6a4f;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .loading-overlay {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading-spinner {
            border: 4px solid #e0e0e0;
            border-top: 4px solid #2d6a4f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .remember-me input {
            margin-right: 8px;
            accent-color: #2d6a4f;
        }

        .remember-me label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 5px;
        }

        .password-toggle:hover {
            color: #2d6a4f;
        }

        .password-wrapper {
            position: relative;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }

            .login-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1>Plant Health Assistant</h1>
                <p>AI-Powered Plant Disease Detection</p>
            </div>

            <!-- Alert Messages -->
            <div id="errorAlert" class="alert-box alert-error">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="errorMessage"></span>
            </div>

            <div id="successAlert" class="alert-box alert-success">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successMessage"></span>
            </div>

            <!-- Login/Register Form -->
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope me-2" style="color: #2d6a4f;"></i>Email Address
                    </label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group" id="nameGroup" style="display: none;">
                    <label class="form-label" for="name">
                        <i class="fas fa-user me-2" style="color: #2d6a4f;"></i>Full Name
                    </label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="name" 
                        placeholder="Enter your full name"
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock me-2" style="color: #2d6a4f;"></i>Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label class="form-label" for="confirmPassword">
                        <i class="fas fa-lock me-2" style="color: #2d6a4f;"></i>Confirm Password
                    </label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmPassword" 
                            placeholder="Confirm your password"
                            autocomplete="new-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-me" id="rememberMeGroup">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me for 30 days</label>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-sign-in-alt me-2" id="submitIcon"></i>
                    <span id="submitText">Login</span>
                </button>
            </form>

            <!-- Toggle Login/Register -->
            <div class="toggle-mode">
                <span id="toggleText">Don't have an account?</span>
                <a href="#" id="toggleLink">Register</a>
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <p style="color: #666; font-size: 14px;">Processing...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let isRegisterMode = false;

        // DOM Elements
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const nameInput = document.getElementById('name');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toggleLink = document.getElementById('toggleLink');
        const toggleText = document.getElementById('toggleText');
        const nameGroup = document.getElementById('nameGroup');
        const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
        const rememberMeGroup = document.getElementById('rememberMeGroup');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const submitIcon = document.getElementById('submitIcon');

        /**
         * Toggle password visibility
         */
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        /**
         * Toggle between login and register modes
         */
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isRegisterMode = !isRegisterMode;
            
            if (isRegisterMode) {
                nameGroup.style.display = 'block';
                confirmPasswordGroup.style.display = 'block';
                rememberMeGroup.style.display = 'none';
                submitText.textContent = 'Create Account';
                submitIcon.className = 'fas fa-user-plus me-2';
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Login';
                nameInput.required = true;
                confirmPasswordInput.required = true;
                passwordInput.autocomplete = 'new-password';
            } else {
                nameGroup.style.display = 'none';
                confirmPasswordGroup.style.display = 'none';
                rememberMeGroup.style.display = 'flex';
                submitText.textContent = 'Login';
                submitIcon.className = 'fas fa-sign-in-alt me-2';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Register';
                nameInput.required = false;
                confirmPasswordInput.required = false;
                passwordInput.autocomplete = 'current-password';
            }
            
            // Clear form and alerts
            authForm.reset();
            hideAlerts();
        });

        /**
         * Show error message
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.style.display = 'block';
            successAlert.style.display = 'none';
            setTimeout(() => {
                errorAlert.style.display = 'none';
            }, 5000);
        }

        /**
         * Show success message
         */
        function showSuccess(message) {
            successMessage.textContent = message;
            successAlert.style.display = 'block';
            errorAlert.style.display = 'none';
        }

        /**
         * Hide all alerts
         */
        function hideAlerts() {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }

        /**
         * Show/hide loading state
         */
        function setLoading(loading) {
            if (loading) {
                authForm.style.display = 'none';
                loadingOverlay.style.display = 'block';
                document.querySelector('.toggle-mode').style.display = 'none';
            } else {
                authForm.style.display = 'block';
                loadingOverlay.style.display = 'none';
                document.querySelector('.toggle-mode').style.display = 'block';
            }
        }

        /**
         * Handle successful authentication
         */
        function handleAuthSuccess(data) {
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Store auth data
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('userName', data.user.name || data.user.email || 'User');
            
            if (rememberMe) {
                localStorage.setItem('rememberMe', 'true');
            }
            
            showSuccess('Login successful! Redirecting...');
            
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        }

        /**
         * Handle form submission
         */
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            if (isRegisterMode) {
                const name = nameInput.value.trim();
                const confirmPassword = confirmPasswordInput.value.trim();
                
                if (!name) {
                    showError('Please enter your name');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
                
                if (password.length < 6) {
                    showError('Password must be at least 6 characters');
                    return;
                }
                
                // Register
                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        handleAuthSuccess(data);
                    } else {
                        showError(data.message || 'Registration failed');
                        setLoading(false);
                    }
                } catch (error) {
                    console.error('Register error:', error);
                    showError('Connection error. Please try again.');
                    setLoading(false);
                }
            } else {
                // Login
                setLoading(true);
                try {
                    const response = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        handleAuthSuccess(data);
                    } else {
                        showError(data.message || 'Invalid email or password');
                        setLoading(false);
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showError('Connection error. Please try again.');
                    setLoading(false);
                }
            }
        });

        /**
         * Check if already logged in
         */
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const response = await fetch(`${API_BASE}/auth/validate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ token })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success && data.valid) {
                        window.location.href = '/dashboard';
                    } else {
                        localStorage.removeItem('authToken');
                        localStorage.removeItem('user');
                    }
                } catch (error) {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('user');
                }
            }
        });
    </script>
</body>
</html>
